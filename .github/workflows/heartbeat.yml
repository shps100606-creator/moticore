name: moticore-agent heartbeat

on:
  schedule:
    - cron: '0 * * * *'
    - cron: '30 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  issues: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run moticore-agent
        env:
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DIALOGUES_TOKEN: ${{ secrets.DIALOGUES_TOKEN }}
          WP_USER: ${{ secrets.WP_USER }}
          WP_APP_PASSWORD: ${{ secrets.WP_APP_PASSWORD }}
          WP_URL: https://moticore.org
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: python agent/run.py

      - name: Commit changes
        run: |
          git config user.name  "moticore-agent"
          git config user.email "moticore-agent@users.noreply.github.com"
          mkdir -p notes reports docs core
          git add memory/ notes/ reports/ docs/ core/ web/
          git diff --cached --quiet || git commit -m "chore(agent): heartbeat log $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push origin main
